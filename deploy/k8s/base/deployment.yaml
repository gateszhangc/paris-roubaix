apiVersion: apps/v1
kind: Deployment
metadata:
  name: paris-roubaix
  labels:
    app.kubernetes.io/name: paris-roubaix
    app.kubernetes.io/part-of: paris-roubaix
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: paris-roubaix
      app.kubernetes.io/part-of: paris-roubaix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paris-roubaix
        app.kubernetes.io/part-of: paris-roubaix
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      imagePullSecrets:
        - name: dokploy-fleet-ghcr
      containers:
        - name: web
          image: ghcr.io/gateszhangc/paris-roubaix:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
            - name: NEXT_PUBLIC_WEB_URL
              value: https://paris-roubaix.lol
            - name: NEXT_PUBLIC_PROJECT_NAME
              value: paris-roubaix
            - name: NEXT_PUBLIC_CLARITY_PROJECT_ID
              value: wb53esm6lg
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            tcpSocket:
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
