apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: paris-roubaix
  namespace: argocd
spec:
  description: Paris-Roubaix keyword site managed from the application repository
  sourceRepos:
    - https://github.com/gateszhangc/paris-roubaix.git
  destinations:
    - namespace: paris-roubaix
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
